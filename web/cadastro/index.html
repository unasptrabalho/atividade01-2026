<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PinkStore | Cadastro</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <div class="logo">🌸 PinkStore</div>
        <nav>
            <a href="../index.html">Home</a>
            <button id="theme-toggle" class="btn-theme">✨ Tema</button>
        </nav>
    </header>
    <main style="padding: 20px;">
        <h2 style="text-align: center;">Cadastrar Novo Produto</h2>
        <form id="form-cadastro">
            <input type="text" id="nome" placeholder="Nome do Produto" required>
            <input type="number" step="0.01" id="preco" placeholder="Preço (Ex: 99.90)" required>
            <input type="text" id="categoria" placeholder="Categoria" required>
            <textarea id="descricao" placeholder="Descrição do produto" rows="4" required></textarea>
            <button type="submit" class="submit-btn">Salvar na PinkStore</button>
        </form>
    </main>
    <script src="script.js"></script>
</body>
</html>
